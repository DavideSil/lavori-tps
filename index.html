<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica</title>
</head>
<body>

<h2>Anagrafica</h2>

<label>Nome</label><br>
<input type="text" id="nome"><br><br>

<label>Cognome</label><br>
<input type="text" id="cognome"><br><br>

<label>Data di Nascita</label><br>
<input type="date" id="dataNascita"><br><br>

<label>Sesso</label><br>
<input type="radio" name="sesso" value="Maschio"> Maschio
<input type="radio" name="sesso" value="Femmina"> Femmina
<input type="radio" name="sesso" value="Altro"> Altro
<br><br>

<label>Indirizzo</label><br>
<input type="text" id="indirizzo"><br><br>

<label>Città</label><br>
<input type="text" id="citta"><br><br>

<label>CAP</label><br>
<input type="text" id="cap"><br><br>

<label>Provincia</label><br>
<select id="provincia">
    <option value="">Seleziona</option>
    <option value="Milano">Milano</option>
    <option value="Varese">Varese</option>
    <option value="Roma">Roma</option>
</select>
<br><br>

<label>Mezzi di Trasporto</label><br>
<input type="checkbox" name="mezzo" value="Auto"> Auto
<input type="checkbox" name="mezzo" value="Moto"> Moto
<input type="checkbox" name="mezzo" value="Bici"> Bici
<br><br>

<label>Materia Preferita</label><br>
<select id="materia">
    <option value="Matematica">Matematica</option>
    <option value="TPSIT">TPSIT</option>
    <option value="Informatica">Informatica</option>
</select>
<br><br>

<button onclick="inserisci()">Inserisci</button>
<br><br>
<p id="msg"></p>

<a href="stampa.html">Visualizza</a>

<script>

    function inserisci() {

        let nome      = document.getElementById("nome").value;
        let cognome   = document.getElementById("cognome").value;
        let data      = document.getElementById("dataNascita").value;
        let indirizzo = document.getElementById("indirizzo").value;
        let citta     = document.getElementById("citta").value;
        let cap       = document.getElementById("cap").value;
        let provincia = document.getElementById("provincia").value;
        let materia   = document.getElementById("materia").value;

        let annoNascita = new Date(data).getFullYear();

        let generazione = "";

        switch (true) {
            case annoNascita >= 1901 && annoNascita <= 1927:
                generazione = "Generazione Grandiosa";
                break;
            case annoNascita >= 1928 && annoNascita <= 1945:
                generazione = "Generazione Silenziosa";
                break;
            case annoNascita >= 1946 && annoNascita <= 1964:
                generazione = "Baby Boomers";
                break;
            case annoNascita >= 1965 && annoNascita <= 1980:
                generazione = "Generazione X";
                break;
            case annoNascita >= 1981 && annoNascita <= 1996:
                generazione = "Millennials";
                break;
            case annoNascita >= 1997 && annoNascita <= 2012:
                generazione = "Generazione Z";
                break;
            case annoNascita >= 2013:
                generazione = "Generazione Alpha";
                break;
            default:
                generazione = "Generazione molto vecchia";
                break;
        }

        let sesso = "";
        let tuttiIRadioSesso = document.getElementsByName("sesso");

        for (let i = 0; i < tuttiIRadioSesso.length; i++) {
            if (tuttiIRadioSesso[i].checked == true) {
                sesso = tuttiIRadioSesso[i].value;
            }
        }

        let mezzi = "";
        let tutteLeCheckboxMezzo = document.getElementsByName("mezzo");

        for (let i = 0; i < tutteLeCheckboxMezzo.length; i++) {
            if (tutteLeCheckboxMezzo[i].checked == true) {
                mezzi = mezzi + tutteLeCheckboxMezzo[i].value + " ";
            }
        }

        let persona = {};
        persona.nome        = nome;
        persona.cognome     = cognome;
        persona.dataNascita = data;
        persona.anno        = annoNascita;
        persona.generazione = generazione;
        persona.sesso       = sesso;
        persona.indirizzo   = indirizzo;
        persona.citta       = citta;
        persona.cap         = cap;
        persona.provincia   = provincia;
        persona.mezzi       = mezzi;
        persona.materia     = materia;

        let elenco = JSON.parse(localStorage.getItem("elenco"));

        if (elenco == null) {
            elenco = [];
        }

        elenco.push(persona);

        localStorage.setItem("elenco", JSON.stringify(elenco));

    }

</script>
</body>
</html>
