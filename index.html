<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica</title>
</head>
<body>

<h2>Inserimento Anagrafica</h2>

<label>Nome</label><br>
<input type="text" id="nome"><br><br>

<label>Cognome</label><br>
<input type="text" id="cognome"><br><br>

<label>Data di Nascita</label><br>
<input type="date" id="dataNascita"><br><br>

<label>Sesso</label><br>
<input type="radio" name="sesso" value="m"> Maschio
<input type="radio" name="sesso" value="f"> Femmina
<input type="radio" name="sesso" value="altro"> Altro
<br><br>

<label>Indirizzo</label><br>
<input type="text" id="indirizzo"><br><br>

<label>Citta</label><br>
<input type="text" id="citta"><br><br>

<label>CAP</label><br>
<input type="text" id="cap"><br><br>

<label>Provincia</label><br>
<select id="provincia">
    <option value="">Seleziona</option>
    <option value="milano">Milano</option>
    <option value="varese">Varese</option>
    <option value="roma">Roma</option>
</select>
<br><br>

<label>Mezzi di trasporto</label><br>
<input type="checkbox" name="mezzo" value="Auto"> Auto
<input type="checkbox" name="mezzo" value="Moto"> Moto
<input type="checkbox" name="mezzo" value="Bici"> Bici
<br><br>

<label>Materie preferite</label><br>
<select id="materie">
    <option value="Matematica">Matematica</option>
    <option value="TPSIT">TPSIT</option>
    <option value="Informatica">Informatica</option>
</select>
<br><br>

<button onclick="inserisci()">Inserisci</button>

<br><br>
<a href="stampa.html">Visualizza</a>

<script>


    function calcolaGenerazione(anno) {
        if (anno >= 1946 && anno <= 1964) return "Baby Boomer";
        if (anno >= 1965 && anno <= 1980) return "Generazione X";
        if (anno >= 1981 && anno <= 1996) return "Millennial";
        if (anno >= 1997 && anno <= 2012) return "Generazione Z";
        if (anno >= 2013)                 return "Generazione Alpha";
        return "Generazione sconosciuta";
    }

    function inserisci() {

        let nome        = document.getElementById("nome").value;
        let cognome     = document.getElementById("cognome").value;
        let dataNascita = document.getElementById("dataNascita").value;
        let indirizzo   = document.getElementById("indirizzo").value;
        let citta       = document.getElementById("citta").value;
        let cap         = document.getElementById("cap").value;
        let provincia   = document.getElementById("provincia").value;

        let sesso = "Non specificato";
        let radioButtons = document.getElementsByName("sesso");
        for (let i = 0; i < radioButtons.length; i++) {
            if (radioButtons[i].checked == true) {
                sesso = radioButtons[i].value;
            }
        }
        let mezzi = [];
        let checkboxes = document.getElementsByName("mezzo");
        for (let i = 0; i < checkboxes.length; i++) {
            if (checkboxes[i].checked == true) {
                mezzi.push(checkboxes[i].value);
            }
        }
        let materie = [];
        let selectMaterie = document.getElementById("materie");
        for (let i = 0; i < selectMaterie.options.length; i++) {
            if (selectMaterie.options[i].selected == true) {
                materie.push(selectMaterie.options[i].value);
            }
        }

      

        let persona = {};
        persona.nome        = nome;
        persona.cognome     = cognome;
        persona.dataNascita = dataNascita;
      
        persona.annoNascita = annoNascita;
        persona.generazione = calcolaGenerazione(annoNascita);
        persona.sesso       = sesso;
        persona.indirizzo   = indirizzo;
        persona.citta       = citta;
        persona.cap         = cap;
        persona.provincia   = provincia;
        persona.mezzi       = mezzi;
        persona.materie     = materie;

        let elenco = JSON.parse(localStorage.getItem("elenco"));
        if (elenco == null) {
            elenco = [];
        }

        elenco.push(persona);

        localStorage.setItem("elenco", JSON.stringify(elenco));

        document.getElementById("messaggio").textContent = "Inserito. Totale: " + elenco.length;
    }

</script>

</body>

</html>
